name: Factory — Scheduled Run

# Runs daily at 6am UTC (1am EST / 10pm PST)
# Checks registry for sites due for a run, processes each one
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Run specific site only (leave blank for all due sites)'
        required: false
        default: ''
      count:
        description: 'Number of articles to generate'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (no API calls, no deposit)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-factory:
    name: Run Article Factory
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout factory repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
                    pip install -r requirements.txt

      - name: Write .env file
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          FACTORY_API_KEY=${{ secrets.FACTORY_API_KEY }}
          SITE_EMPIRE_URL=${{ secrets.SITE_EMPIRE_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Check registry — which sites are due
        id: registry_check
        run: |
                    python registry.py due || echo "No sites due or registry unavailable"

      # ── Scheduled mode: run all due sites ─────────────────────────────────
      - name: Run due sites (scheduled)
        if: github.event_name == 'schedule'
        run: |
                    python orchestrator.py due
        env:
          PYTHONIOENCODING: utf-8

      # ── Manual mode: run specific site or all due ──────────────────────────
      - name: Run specific site (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.site != ''
        run: |
                    ARGS="--site ${{ inputs.site }} --count ${{ inputs.count }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python orchestrator.py run $ARGS
        env:
          PYTHONIOENCODING: utf-8

      - name: Run all due sites (manual dispatch, no site specified)
        if: github.event_name == 'workflow_dispatch' && inputs.site == ''
        run: |
                    python orchestrator.py due
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload pipeline artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            pipeline/
            logs/
          retention-days: 3

      - name: Report registry status
        if: always()
        run: |
                    python registry.py list || true
        env:
          PYTHONIOENCODING: utf-8
