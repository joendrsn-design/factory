name: Factory — Batch Submit

# Manual trigger only — starts a batch run for high-volume production
# After running this, wait 15-30 min then run factory-batch-collect.yml
on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Site ID (e.g. lamphill)'
        required: true
      count:
        description: 'Number of articles to batch'
        required: true
        default: '5'
      stages:
        description: 'Stages to submit (comma-separated: topics,research,planning,write,qa)'
        required: false
        default: 'topics,research'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  batch-submit:
    name: Submit Batch — ${{ inputs.site }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd factory
          pip install -r requirements.txt

      - name: Write .env
        run: |
          cat > factory/.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          FACTORY_API_KEY=${{ secrets.FACTORY_API_KEY }}
          SITE_EMPIRE_URL=${{ secrets.SITE_EMPIRE_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Generate topics
        if: contains(inputs.stages, 'topics')
        run: |
          cd factory
          python topic_generator.py run --site ${{ inputs.site }} --count ${{ inputs.count }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit research batch
        if: contains(inputs.stages, 'research')
        run: |
          cd factory
          python research.py submit --input pipeline/topics --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit planning batch
        if: contains(inputs.stages, 'planning')
        run: |
          cd factory
          python planning.py submit --input pipeline/research --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit write batch
        if: contains(inputs.stages, 'write')
        run: |
          cd factory
          python write.py submit --input pipeline/plans --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit QA batch
        if: contains(inputs.stages, 'qa')
        run: |
          cd factory
          python qa.py submit --input pipeline/articles --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      # Save pipeline state between jobs — batch IDs live in pipeline/ files
      - name: Upload pipeline state
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state-${{ inputs.site }}-${{ github.run_id }}
          path: factory/pipeline/
          retention-days: 2

      - name: Print next step instructions
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Batch submitted for: ${{ inputs.site }}"
          echo "  Artifact ID: pipeline-state-${{ inputs.site }}-${{ github.run_id }}"
          echo ""
          echo "  Wait 15–30 minutes, then run:"
          echo "  factory-batch-collect.yml"
          echo "  with run_id: ${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
