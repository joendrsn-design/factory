name: Bing — Reconciliation

# Polls Bing Webmaster Tools API to check verification status
# of pending sites and updates database accordingly
on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reconcile:
    name: Bing Verification Reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Write .env
        run: |
          cat > .env << EOF
          BING_WEBMASTER_API_KEY=${{ secrets.BING_WEBMASTER_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Run Bing reconciliation
        run: |
          python -m onboarding.bing_reconcile --max-sites 50
        env:
          PYTHONIOENCODING: utf-8

      - name: Report results
        if: always()
        run: |
          echo "✅ Bing reconciliation complete"
