name: Factory — Batch Collect & Deposit

# Run this 15-30 min after factory-batch-submit.yml
# Collects completed batches, runs remaining stages, deposits to Site Empire
on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Site ID (e.g. lamphill)'
        required: true
      submit_run_id:
        description: 'Run ID from the batch-submit workflow (for pipeline state)'
        required: true
      stages:
        description: 'Stages to collect+run (comma-separated: research,planning,write,qa,deposit)'
        required: false
        default: 'research,planning,write,qa,deposit'
      skip_deposit:
        description: 'Skip deposit to Site Empire (collect and write only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  batch-collect:
    name: Collect & Deposit — ${{ inputs.site }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          FACTORY_API_KEY=${{ secrets.FACTORY_API_KEY }}
          SITE_EMPIRE_URL=${{ secrets.SITE_EMPIRE_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      # Restore pipeline state from submit job
      - name: Download pipeline state
        uses: actions/download-artifact@v5
        with:
          name: pipeline-state-${{ inputs.site }}-${{ inputs.submit_run_id }}
          path: factory/pipeline/

      - name: Collect research batch
        if: contains(inputs.stages, 'research')
        run: python research.py collect --output pipeline/research --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit + collect planning
        if: contains(inputs.stages, 'planning')
        run: |
          python planning.py submit --input pipeline/research --site ${{ inputs.site }}
          echo "Polling for planning batch completion..."
          for i in {1..30}; do
            sleep $((60 + i * 10))  # Start at 70s, increase by 10s each iteration
            if python planning.py collect --output pipeline/plans --site ${{ inputs.site }} 2>&1; then
              echo "Planning batch collected successfully"
              break
            fi
            echo "Attempt $i: batch not ready, waiting..."
            if [ $i -eq 30 ]; then
              echo "ERROR: Planning batch timed out after 30 attempts"
              exit 1
            fi
          done
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit + collect write
        if: contains(inputs.stages, 'write')
        run: |
          python write.py submit --input pipeline/plans --site ${{ inputs.site }}
          echo "Polling for write batch completion (Opus — may take 15-30 min)..."
          for i in {1..40}; do
            sleep $((120 + i * 30))  # Start at 150s, increase by 30s each iteration
            if python write.py collect --output pipeline/articles --site ${{ inputs.site }} 2>&1; then
              echo "Write batch collected successfully"
              break
            fi
            echo "Attempt $i: batch not ready, waiting..."
            if [ $i -eq 40 ]; then
              echo "ERROR: Write batch timed out after 40 attempts"
              exit 1
            fi
          done
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit + collect QA
        if: contains(inputs.stages, 'qa')
        run: |
          python qa.py submit --input pipeline/articles --site ${{ inputs.site }}
          echo "Polling for QA batch completion..."
          for i in {1..30}; do
            sleep $((60 + i * 10))  # Start at 70s, increase by 10s each iteration
            if python qa.py collect --output pipeline/qa --site ${{ inputs.site }} 2>&1; then
              echo "QA batch collected successfully"
              break
            fi
            echo "Attempt $i: batch not ready, waiting..."
            if [ $i -eq 30 ]; then
              echo "ERROR: QA batch timed out after 30 attempts"
              exit 1
            fi
          done
        env:
          PYTHONIOENCODING: utf-8

      - name: Deposit to Site Empire
        if: contains(inputs.stages, 'deposit') && inputs.skip_deposit != 'true'
        run: python deposit.py --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload final pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-final-${{ inputs.site }}-${{ github.run_id }}
          path: factory/pipeline/
          retention-days: 7

      - name: Registry status
        if: always()
        run: python registry.py status ${{ inputs.site }} || true
        env:
          PYTHONIOENCODING: utf-8
