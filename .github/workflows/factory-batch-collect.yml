name: Factory — Batch Collect & Deposit

# Run this 15-30 min after factory-batch-submit.yml
# Collects completed batches, runs remaining stages, deposits to Site Empire
on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Site ID (e.g. lamphill)'
        required: true
      submit_run_id:
        description: 'Run ID from the batch-submit workflow (for pipeline state)'
        required: true
      stages:
        description: 'Stages to collect+run (comma-separated: research,planning,write,qa,deposit)'
        required: false
        default: 'research,planning,write,qa,deposit'
      skip_deposit:
        description: 'Skip deposit to Site Empire (collect and write only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  batch-collect:
    name: Collect & Deposit — ${{ inputs.site }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd factory
          pip install -r requirements.txt

      - name: Write .env
        run: |
          cat > factory/.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          FACTORY_API_KEY=${{ secrets.FACTORY_API_KEY }}
          SITE_EMPIRE_URL=${{ secrets.SITE_EMPIRE_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      # Restore pipeline state from submit job
      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-${{ inputs.site }}-${{ inputs.submit_run_id }}
          path: factory/pipeline/

      - name: Collect research batch
        if: contains(inputs.stages, 'research')
        run: |
          cd factory
          python research.py collect --output pipeline/research --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit + collect planning
        if: contains(inputs.stages, 'planning')
        run: |
          cd factory
          python planning.py submit --input pipeline/research --site ${{ inputs.site }}
          echo "Waiting for planning batch..."
          sleep 300  # 5 min — planning is fast (Haiku)
          python planning.py collect --output pipeline/plans --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit write batch
        if: contains(inputs.stages, 'write')
        run: |
          cd factory
          python write.py submit --input pipeline/plans --site ${{ inputs.site }}
          echo "Waiting for write batch (Opus — ~20 min)..."
          sleep 1200  # 20 min
          python write.py collect --output pipeline/articles --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Submit + collect QA
        if: contains(inputs.stages, 'qa')
        run: |
          cd factory
          python qa.py submit --input pipeline/articles --site ${{ inputs.site }}
          echo "Waiting for QA batch..."
          sleep 300  # 5 min
          python qa.py collect --output pipeline/qa --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Deposit to Site Empire
        if: contains(inputs.stages, 'deposit') && inputs.skip_deposit != 'true'
        run: |
          cd factory
          python deposit.py --site ${{ inputs.site }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload final pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-final-${{ inputs.site }}-${{ github.run_id }}
          path: factory/pipeline/
          retention-days: 7

      - name: Registry status
        if: always()
        run: |
          cd factory
          python registry.py status ${{ inputs.site }} || true
        env:
          PYTHONIOENCODING: utf-8
